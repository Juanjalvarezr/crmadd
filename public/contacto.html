<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto - DESEO DIGITAL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(150deg, #0f0f12 0%, #1a1a22 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 28px 26px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    .brand {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .brand span { color: #e91e63; }
    .sub { color: #b0b0c0; font-size: 0.95rem; margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.8rem;
      color: #d0d0e0;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: #e91e63; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e91e63, #9c27b0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .note {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #9090a8;
      text-align: center;
    }
  </style>
</head>
<body>
  <form id="leadForm" class="card">
    <div class="brand">DESEO <span>DIGITAL</span></div>
    <div class="sub">Agencia Inteligente — CRM + Datos + Resultado</div>

    <label for="nombre">Nombre completo</label>
    <input id="nombre" name="nombre" required placeholder="Tu nombre" />

    <label for="empresa">Empresa</label>
    <input id="empresa" name="empresa" required placeholder="Nombre de tu empresa" />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required placeholder="correo@empresa.com" />

    <label for="telefono">Teléfono</label>
    <input id="telefono" name="telefono" placeholder="+57 300 000 0000" />

    <label for="servicio">Servicio de interés</label>
    <select id="servicio" name="servicio" required>
      <option value="" disabled selected>Selecciona un servicio</option>
      <option value="SEO">SEO</option>
      <option value="Social Media">Social Media</option>
      <option value="Contenido">Contenido</option>
      <option value="Diseño Web">Diseño Web</option>
      <option value="Analytics">Analytics</option>
      <option value="Paquete SEO 3 meses">Paquete SEO 3 meses</option>
      <option value="Paquete SEO 5 meses">Paquete SEO 5 meses</option>
      <option value="Paquete SEO 7 meses">Paquete SEO 7 meses</option>
    </select>

    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" rows="3" placeholder="Cuéntanos qué necesitas..."></textarea>

    <button type="submit">Enviar solicitud</button>
    <div class="note">Tus datos se guardan directamente en nuestro CRM.</div>
  </form>

  <script>
    const form = document.getElementById('leadForm');
    const endpoint = 'https://crmadd.vercel.app/api/leads';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.ok) {
          alert('Solicitud enviada correctamente. Te contactaremos pronto.');
          form.reset();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (err) {
        alert('Error de conexión. Intenta de nuevo.');
      }
    });
  </script>
</body>
</html>
